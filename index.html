<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyBoy</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;

  /* 🔥 זה מה שממרכז הכל */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* רקע זוהר */
.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: #00eaff;
  filter: blur(150px);
  opacity: 0.2;
  top: -100px;
  left: -100px;
  animation: move 10s infinite alternate;
}

@keyframes move {
  0% {transform: translate(0,0);}
  100% {transform: translate(200px,200px);}
}

/* קונטיינר */
.container {
  text-align: center;
  z-index: 2;
}

/* תמונה */
.profile img {
  width: 130px;
  border-radius: 50%;
  border: 3px solid #00eaff;
  box-shadow: 0 0 25px #00eaff;
  transition: 0.4s;
}
.profile img:hover {
  transform: scale(1.1);
}

/* שם */
h1 {
  margin: 15px 0;
  font-size: 34px;
  color: white;
}

/* לינקים */
.links a {
  display: block;
  width: 280px;
  margin: 15px auto;
  padding: 15px;
  text-decoration: none;
  color: #00eaff;
  border: 2px solid #00eaff;
  border-radius: 12px;
  transition: 0.3s;
  font-weight: bold;
}

.links a:hover {
  background: #00eaff;
  color: black;
  transform: scale(1.08);
  box-shadow: 0 0 25px #00eaff;
}

/* טקסט תחתון */
.footer {
  margin-top: 30px;
  color: #aaa;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

  <div class="profile">
    <img src="https://cdn.discordapp.com/attachments/985166996364722197/1489407781323800776/IDL_LOGO.png?ex=69d04e96&is=69cefd16&hm=5512f8610adc981a6eeb3dd668a08a9ea1a4f5662d57bdae270234ad8373b273&.png">
  </div>

  <h1>🔥JoyBoy</h1>
  <div class="bio">🎮 Content Creator | Streaming & Gaming</div>

  <div class="links">
    <a href="https://kick.com/joyboyidl">🎮 Kick</a>
    <a href="https://www.youtube.com/@SterbenIDL">📺 YouTube</a>
    <a href="https://discord.gg/TRkXjHbGWp">💬 Discord</a>
    <a href="https://instagram.com/idan.lapierre">📸 Instagram</a>
    <a href="#">💎 Support Me</a>
  </div>

  <div class="footer">© 2026 JoyBoy</div>

</div>

</body>
</html>
