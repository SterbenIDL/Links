<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyBoyIDL - Links</title>

<link rel="icon" href="IDL_LOGO.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* background gradient */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(270deg, #00e5ff22, #6228d722, #00e5ff22);
  background-size: 600% 600%;
  animation: gradientMove 18s ease infinite;
  z-index: -4;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.05;
  z-index: -2;
  pointer-events: none;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('IDL_Banner.png') center/cover no-repeat;
  z-index: -3;
  transform: scale(1.08);
  transition: transform 0.2s ease;
}

.bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 35px;
  width: 340px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  animation: fadeIn 1s ease;
  position: relative;
  overflow: hidden;
  z-index: 2;

  transform-style: preserve-3d;
  transition: transform 0.2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* border glow */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 1px;
  border-radius: 20px;
  background: linear-gradient(
    135deg,
    rgba(0,229,255,0.6),
    rgba(0,229,255,0.15)
  );
  z-index: -1;
}

/* inner glass */
.card::after {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 19px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  z-index: -1;
}

/* AVATAR */
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
  transition: 0.3s;
  cursor: pointer;
}

.avatar:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(255,255,255,0.3);
}

/* TEXT */
h1 {
  font-size: 40px;
  letter-spacing: 2px;
  font-weight: 900;
  color: #00e5ff;
  text-shadow: 0 0 6px rgba(0,229,255,0.4);
}

p {
  opacity: 0.75;
  font-size: 14px;
  margin-bottom: 20px;
}

/* LINKS */
.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.btn:hover {
  transform: translateY(-4px) scale(1.04);
}

/* COLORS */
.youtube { background: linear-gradient(45deg, #FF0000, #111); }
.tiktok { background: linear-gradient(45deg, #111, #ee2a7b, #6228d7); }
.discord { background: linear-gradient(45deg, #5865F2, #6228d7); }
.kick { background: linear-gradient(45deg, #00e701, #111); }
.instagram { background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7); }
.reddit { background: linear-gradient(45deg, #FF4500, #FF8717); }
.linkedin { background: linear-gradient(45deg, #0077B5, #00A0DC); }

/* LIVE STATUS */
.live-status {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.75);
  border: 1px solid #00e5ff;
  padding: 14px 18px;
  border-radius: 12px;
  color: #00e5ff;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(0,229,255,0.4);
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
  transition: 0.5s;
}

.live-status.show {
  opacity: 1;
  transform: translateY(0);
}

footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<img src="IDL_LOGO.png" class="avatar" id="avatar">

<h1>JoyBoy IDL</h1>
<p>Official Links • Join The IDL Community</p>

<div class="links">
<a href="#" class="btn youtube"><i class="fab fa-youtube"></i> YouTube</a>
<a href="#" class="btn tiktok"><i class="fab fa-tiktok"></i> TikTok</a>
<a href="#" class="btn discord"><i class="fab fa-discord"></i> Discord</a>
<a href="#" class="btn kick"><i class="fa-brands fa-kickstarter-k"></i> Kick</a>
<a href="#" class="btn instagram"><i class="fab fa-instagram"></i> Instagram</a>
<a href="#" class="btn reddit"><i class="fa-brands fa-reddit-alien"></i> Reddit</a>
<a href="#" class="btn linkedin"><i class="fa-brands fa-linkedin"></i> Linkedin</a>
</div>

</div>

<div id="liveStatus" class="live-status">
🔴 LIVE NOW<br>
<span>Active / Online</span>
</div>

<footer>
© 2026 JoyBoyIDL • All Rights Reserved
</footer>

<script>
const card = document.querySelector(".card");
const bg = document.querySelector(".bg");

/* 3D TILT */
card.addEventListener("mousemove", (e) => {
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  const rotateX = (y - centerY) / 20;
  const rotateY = (x - centerX) / -20;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

card.addEventListener("mouseleave", () => {
  card.style.transform = "rotateX(0) rotateY(0)";
});

/* BACKGROUND PARALLAX */
document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 20;
  const y = (e.clientY / window.innerHeight - 0.5) * 20;

  bg.style.transform = `translate(${x}px, ${y}px) scale(1.08)`;
});

/* LIVE STATUS */
const avatar = document.getElementById('avatar');
const liveStatus = document.getElementById('liveStatus');

avatar.addEventListener('click', () => {
  liveStatus.classList.add('show');

  setTimeout(() => {
    liveStatus.classList.remove('show');
  }, 3000);
});
</script>

</body>
</html>
