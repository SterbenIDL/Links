<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyBoyIDL - Links</title>

<link rel="icon" href="IDL_LOGO.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('IDL_Banner.png') center/cover no-repeat;
  z-index: -3;
  animation: bgZoom 20s ease-in-out infinite alternate;
}

@keyframes bgZoom {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}

.bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 35px;
  width: 340px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  animation: fadeIn 1s ease;
  position: relative;
  z-index: 2;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* AVATAR */
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
  transition: 0.3s;
  cursor: pointer;
}

.avatar:hover {
  transform: scale(1.1);
}

/* TEXT */
h1 {
  font-size: 40px;
  letter-spacing: 2px;
  font-weight: 900;
  color: #00e5ff;
  text-shadow: 0 0 6px rgba(0,229,255,0.4);
  transition: 0.3s;
}

h1:hover {
  text-shadow: 0 0 10px rgba(0,229,255,0.6);
}

p {
  opacity: 0.7;
  font-size: 14px;
  margin-bottom: 20px;
}

/* LINKS */
.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.links a {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;
}

.links a:nth-child(1) { animation-delay: 0.2s; }
.links a:nth-child(2) { animation-delay: 0.4s; }
.links a:nth-child(3) { animation-delay: 0.6s; }
.links a:nth-child(4) { animation-delay: 0.8s; }
.links a:nth-child(5) { animation-delay: 1s; }
.links a:nth-child(6) { animation-delay: 1.2s; }
.links a:nth-child(7) { animation-delay: 1.4s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
  transition: 0.5s;
}

.btn:hover::after {
  left: 100%;
}

.btn:hover {
  transform: scale(1.05) translateY(-2px);
}

/* COLORS */
.youtube { background: linear-gradient(45deg, #FF0000, #111); }
.tiktok { background: linear-gradient(45deg, #111, #ee2a7b, #6228d7); }
.discord { background: linear-gradient(45deg, #5865F2, #6228d7); }
.kick { background: linear-gradient(45deg, #00e701, #111); }
.instagram { background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7); }
.reddit { background: linear-gradient(45deg, #FF4500, #FF8717); }
.linkedin { background: linear-gradient(45deg, #0077B5, #00A0DC); }

.youtube:hover { box-shadow: 0 0 30px rgba(255,0,0,1); }
.tiktok:hover { box-shadow: 0 0 30px rgba(238,42,123,1); }
.discord:hover { box-shadow: 0 0 30px rgba(88,101,242,1); }
.kick:hover { box-shadow: 0 0 30px rgba(0,231,1,1); }
.instagram:hover { box-shadow: 0 0 30px rgba(238,42,123,1); }
.reddit:hover { box-shadow: 0 0 30px rgba(255,69,0,1); }
.linkedin:hover { box-shadow: 0 0 30px rgba(0,119,181,1); }

/* LIVE STATUS */
.live-status {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.75);
  border: 1px solid #00e5ff;
  padding: 14px 18px;
  border-radius: 12px;
  color: #00e5ff;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(0,229,255,0.4);
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
  transition: 0.5s cubic-bezier(0.25, 1, 0.5, 1);
}

.live-status::before {
  content: "●";
  color: red;
  margin-right: 6px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
  100% { opacity: 1; transform: scale(1); }
}

.subs {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.8;
  animation: fadeNumber 0.6s ease;
}

@keyframes fadeNumber {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.live-status span {
  font-size: 12px;
  opacity: 0.7;
  display: block;
}

.live-status.show {
  opacity: 1;
  transform: translateY(0);
}

/* FOOTER */
footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<img src="IDL_LOGO.png" class="avatar" id="avatar">

<h1>JoyBoy IDL</h1>
<p>Official Links • Join The IDL Community</p>

<div class="links">
<a href="https://www.youtube.com/@SterbenIDL" class="btn youtube"><i class="fab fa-youtube"></i> YouTube</a>
<a href="https://www.tiktok.com/@joyboyidl" class="btn tiktok"><i class="fab fa-tiktok"></i> TikTok</a>
<a href="https://discord.gg/TRkXjHbGWp" class="btn discord"><i class="fab fa-discord"></i> Discord</a>
<a href="https://kick.com/joyboyidl" class="btn kick"><i class="fa-brands fa-kickstarter-k"></i> Kick</a>
<a href="https://instagram.com/idanlapierre" class="btn instagram"><i class="fab fa-instagram"></i> Instagram</a>
<a href="https://www.reddit.com/user/IDL_YTB/" class="btn reddit"><i class="fa-brands fa-reddit-alien"></i> Reddit</a>
<a href="https://www.linkedin.com/in/idan-lapierre/" class="btn linkedin"><i class="fa-brands fa-linkedin"></i> Linkedin</a>
</div>

</div>

<!-- LIVE STATUS POPUP -->
<div id="liveStatus" class="live-status">
  🔴 LIVE NOW<br>
  <span>Active / Online</span>
  <div class="subs">👥 7 Subscribers</div>
</div>

<footer>
© 2026 JoyBoyIDL • All Rights Reserved
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const avatar = document.getElementById('avatar');
  const liveStatus = document.getElementById('liveStatus');

  avatar.addEventListener('click', () => {
    liveStatus.classList.add('show');

    setTimeout(() => {
      liveStatus.classList.remove('show');
    }, 3000);
  });
});
</script>

</body>
</html>
