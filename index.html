<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(-45deg, #000, #0f172a, #020617, #111827);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  z-index: -2;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* glow */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,200,255,0.3), transparent 70%);
  filter: blur(80px);
  z-index: -1;
}

/* card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  border-radius: 20px;
  padding: 35px;
  width: 340px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* avatar/logo */
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
  border: 2px solid rgba(255,255,255,0.2);
}

/* title */
h1 {
  font-size: 40px;
  letter-spacing: 3px;
}

p {
  opacity: 0.7;
  font-size: 14px;
  margin-bottom: 15px;
}

/* links */
.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* base button */
.btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

/* icons */
.btn i {
  font-size: 18px;
}

/* platform colors */
.youtube { background: #FF0000; }
.tiktok { background: #111; }
.discord { background: #5865F2; }
.kick { background: #00e701; color: black; }
.instagram { 
  background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
}

/* hover */
.btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* footer */
footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
}
</style>
</head>
