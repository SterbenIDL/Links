<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyBoy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  backdrop-filter: blur(8px);
  color: white;
  text-align: center;
}

.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding-top: 80px;
}

.profile img {
  width: 130px;
  border-radius: 50%;
  border: 3px solid #fff;
  transition: 0.3s;
}
.profile img:hover {
  transform: scale(1.1);
}

h1 {
  margin: 10px 0;
  font-weight: 600;
}

.bio {
  opacity: 0.8;
  margin-bottom: 30px;
}

.links a {
  display: block;
  width: 280px;
  margin: 12px auto;
  padding: 14px;
  text-decoration: none;
  color: white;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  transition: 0.3s;
  font-weight: 500;
}

.links a:hover {
  background: white;
  color: black;
  transform: scale(1.05);
}

.links a span {
  float: left;
}

.socials {
  margin-top: 25px;
}

.socials i {
  margin: 10px;
  font-size: 22px;
  cursor: pointer;
}

.footer {
  margin-top: 40px;
  font-size: 12px;
  opacity: 0.6;
}
</style>

<!-- Icons -->
<script src="https://kit.fontawesome.com/yourkit.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="overlay">

  <div class="profile">
    <img src="https://cdn.discordapp.com/attachments/985166996364722197/1489407781323800776/IDL_LOGO.png?ex=69d04e96&is=69cefd16&hm=5512f8610adc981a6eeb3dd668a08a9ea1a4f5662d57bdae270234ad8373b273&.png">
  </div>

  <h1>JoyBoy</h1>
  <div class="bio">🎮 Content Creator | Streaming & Gaming</div>

  <div class="links">
    <a href="https://twitch.tv/yourname">🎮 Twitch</a>
    <a href="https://youtube.com">📺 YouTube</a>
    <a href="https://discord.gg">💬 Discord</a>
    <a href="https://instagram.com">📸 Instagram</a>
    <a href="#">💎 Support Me</a>
  </div>

  <div class="footer">
    © 2026 JoyBoy
  </div>

</div>

</body>
</html>
