<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDL Links</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: white;
}

/* Animated background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(-45deg, #000000, #0f172a, #020617, #111827);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  z-index: -2;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* glow effect */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,200,255,0.3), transparent 70%);
  filter: blur(80px);
  animation: floatGlow 6s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatGlow {
  0% {transform: translate(-50%, -50%) translateY(0px);}
  50% {transform: translate(-50%, -50%) translateY(40px);}
  100% {transform: translate(-50%, -50%) translateY(0px);}
}

/* card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  border-radius: 20px;
  padding: 40px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 42px;
  letter-spacing: 4px;
}

p {
  margin-top: 10px;
  opacity: 0.7;
  font-size: 14px;
}

/* buttons */
.links {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.08);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

/* hover glow */
.btn:hover {
  transform: scale(1.06);
  background: rgba(255,255,255,0.15);
  box-shadow: 0 0 20px rgba(0,200,255,0.3);
}

/* ripple effect */
.btn::after {
  content: "";
  position: absolute;
  width: 100px;
  height: 100px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  transform: scale(0);
  opacity: 0;
  transition: transform 0.5s, opacity 1s;
}

.btn:active::after {
  transform: scale(3);
  opacity: 1;
  transition: 0s;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="card">
  <h1>JoyBoy IDL</h1>
  <p>Content Creator | Streaming & Gaming</p>

  <div class="links">
    <a href="https://www.youtube.com/@SterbenIDL" class="btn">YouTube</a>
    <a href="https://www.TikTok.com/@joyboyidl" class="btn">TikTok</a>
    <a href="https://discord.gg/TRkXjHbGWp" class="btn">Discord</a>
    <a href="https://kick.com/joyboyidl" class="btn">Kick</a>
    <a href="https://instagram.com/idanlapierre" class="btn">Instagram</a>
    <a href="#" class="btn">Support Me</a>
  </div>
</div>

<div class="footer">© 2026 JoyBoy</div>

</body>
</html>
