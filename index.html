<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* BACKGROUND IMAGE */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://cdn.discordapp.com/attachments/985166996364722197/1489667320061366335/IDL_Banner.png?ex=69d1404d&is=69cfeecd&hm=7e154c38baa644b1815004c9dcac40e925fa65a40a7a5eeec4260c08230998b4&') center/cover no-repeat;
  z-index: -3;
}

.bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  border-radius: 20px;
  padding: 35px;
  width: 340px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.7);
  animation: fadeIn 1s ease;
  position: relative;
  z-index: 2;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* AVATAR */
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
  border: 2px solid rgba(255,255,255,0.2);
  transition: 0.3s;
  object-fit: cover; /* 🔥 חשוב */
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

.avatar:hover {
  transform: scale(1.1);
}

/* TEXT */
h1 {
  font-size: 38px;
  letter-spacing: 2px;
}

p {
  opacity: 0.7;
  font-size: 14px;
  margin-bottom: 20px;
}

/* LINKS */
.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: all 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

a {
  cursor: pointer;
}

/* ANIMATION */
.links a {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;
}

.links a:nth-child(1) { animation-delay: 0.2s; }
.links a:nth-child(2) { animation-delay: 0.4s; }
.links a:nth-child(3) { animation-delay: 0.6s; }
.links a:nth-child(4) { animation-delay: 0.8s; }
.links a:nth-child(5) { animation-delay: 1s; }
.links a:nth-child(6) { animation-delay: 1.2s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* COLORS */
.youtube { background: linear-gradient(45deg, #FF0000, #111, #F5F5F5); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
.tiktok { background: linear-gradient(45deg, #111, #ee2a7b, #6228d7); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
.discord { background: linear-gradient(45deg, #5865F2, #6228d7, #F5F5F5); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
.kick { background: linear-gradient(45deg, #00e701, #111, #F5F5F5); box-shadow: 0 0 10px rgba(27, 18, 18, 0.3); }
.instagram { background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
.reddit .reddit { background: linear-gradient(45deg, #FF4500, #FF8717); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
.linkedin { background: linear-gradient(45deg, #0077B5, #00A0DC); box-shadow: 0 0 10px rgba(0,0,0,0.3); }

/* SPECIAL GLOW */
.youtube:hover { box-shadow: 0 0 30px rgba(255, 0, 0, 1); }
.tiktok:hover { box-shadow: 0 0 30px rgba(255, 255, 255, 0.7); }
.discord:hover { box-shadow: 0 0 30px rgba(88, 101, 242, 1); }
.kick:hover { box-shadow: 0 0 30px rgba(0, 231, 1, 1); }
.instagram:hover { box-shadow: 0 0 30px rgba(238, 42, 123, 1); }
.reddit:hover { box-shadow: 0 0 30px rgba(255, 69, 0, 1); }
.linkedin:hover { box-shadow: 0 0 30px rgba(0, 119, 181, 1); }

/* HOVER */
.btn:hover {
  transform: scale(1.05) translateY(-2px);
  opacity: 0.95;
}

.btn:active {
  transform: scale(0.97);
}

/* FOOTER */
footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
}
</style>
