<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#loader img {
  width: 120px;
  animation: heartbeat 1.2s infinite;
}

@keyframes heartbeat {
  0% { transform: scale(1); }
  25% { transform: scale(1.15); }
  40% { transform: scale(1); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://cdn.discordapp.com/attachments/985166996364722197/1489667320061366335/IDL_Banner.png') center/cover no-repeat;
  z-index: -3;
  animation: bgZoom 20s ease-in-out infinite alternate;
}

@keyframes bgZoom {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}

.bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 35px;
  width: 340px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  animation: fadeIn 1s ease;
  position: relative;
  z-index: 2;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* AVATAR */
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
  transition: 0.3s;
}

.avatar:hover {
  transform: scale(1.1);
}

/* TEXT */
h1 {
  font-size: 38px;
  letter-spacing: 2px;
}

p {
  opacity: 0.7;
  font-size: 14px;
  margin-bottom: 20px;
}

/* LINKS */
.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
}

/* shine effect */
.btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
  transition: 0.5s;
}

.btn:hover::after {
  left: 100%;
}

.btn:hover {
  transform: scale(1.05) translateY(-2px);
}

/* ANIMATION */
.links a {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;
}

.links a:nth-child(1) { animation-delay: 0.2s; }
.links a:nth-child(2) { animation-delay: 0.4s; }
.links a:nth-child(3) { animation-delay: 0.6s; }
.links a:nth-child(4) { animation-delay: 0.8s; }
.links a:nth-child(5) { animation-delay: 1s; }
.links a:nth-child(6) { animation-delay: 1.2s; }
.links a:nth-child(7) { animation-delay: 1.4s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* COLORS + GLOW */
.youtube { background: linear-gradient(45deg, #FF0000, #111); }
.tiktok { background: linear-gradient(45deg, #111, #ee2a7b, #6228d7); }
.discord { background: linear-gradient(45deg, #5865F2, #6228d7); }
.kick { background: linear-gradient(45deg, #00e701, #111); }
.instagram { background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7); }
.reddit { background: linear-gradient(45deg, #FF4500, #FF8717); }
.linkedin { background: linear-gradient(45deg, #0077B5, #00A0DC); }

.youtube:hover { box-shadow: 0 0 30px rgba(255,0,0,1); }
.tiktok:hover { box-shadow: 0 0 30px rgba(238,42,123,1); }
.discord:hover { box-shadow: 0 0 30px rgba(88,101,242,1); }
.kick:hover { box-shadow: 0 0 30px rgba(0,231,1,1); }
.instagram:hover { box-shadow: 0 0 30px rgba(238,42,123,1); }
.reddit:hover { box-shadow: 0 0 30px rgba(255,69,0,1); }
.linkedin:hover { box-shadow: 0 0 30px rgba(0,119,181,1); }

/* FOOTER */
footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
}
</style>
